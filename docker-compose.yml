# ── Ethara docker-compose ───────────────────────────────────────────
# Brings up three services: PostgreSQL, FastAPI backend, React frontend

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ethara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethara_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ethara_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ethara}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ethara}:${POSTGRES_PASSWORD:-ethara_secret}@db:5432/${POSTGRES_DB:-ethara_db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
    name: ethara_pgdata
