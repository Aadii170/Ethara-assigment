# Ethara Frontend — Nginx configuration
# Serves the React SPA and handles client-side routing

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any path that doesn't match a file is routed
    # back to index.html so React Router can handle it
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # disable caching for the HTML shell (so deployments take effect)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
